<!DOCTYPE html>
<html lang="en">
<head>
  <title>Contact - CrochetCraft</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS ONLY -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
body {
  background: linear-gradient(to right, #fff6f9, #e6d6ff);
}

.navbar {
  background: #f8c8dc !important;
}

/* Navbar mobile */
.nav {
  flex-wrap: wrap;
  justify-content: center;
}

/* Glass card */
.glass-card {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(12px);
  border-radius: 20px;
}

/* Button */
.btn-custom {
  background: #f8c8dc;
  border: none;
  transition: 0.3s;
}

.btn-custom:hover {
  background: #f3a9c4;
}

/* Mobile fix */
@media(max-width:768px){

  .contact-info {
    text-align: center;
  }

  .contact-info p {
    justify-content: center;
  }

  h2 {
    text-align: center;
  }
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg" style="background:#f8c8dc;">
  <div class="container">
    <a class="navbar-brand fw-bold" href="contact.html">🧶 CrochetCraft</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      ☰
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="products.html">Shop</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Contact Section -->
<div class="container mt-5">
  <div class="row align-items-center">

    <!-- Left Info -->
    <div class="col-md-5 mb-4">
      <h2 class="fw-bold">Get in Touch 💌</h2>
      <p>We’d love to hear from you! Whether it’s feedback, queries, or custom orders.</p>

      <div class="contact-info mt-4">
        <p><i>📍</i> Vadodara, Gujarat</p>
        <p><i>📞</i> +91 98765 43210</p>
        <p><i>📧</i> crochetcraft@email.com</p>
      </div>
    </div>

    <!-- Right Form -->
    <div class="col-md-7">
      <form class="glass-card p-4 shadow">

        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" placeholder="Enter your name" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Message</label>
          <textarea class="form-control" rows="4" placeholder="Write your message..."></textarea>
        </div>

        <button class="btn btn-custom w-100">Send Message</button>

      </form>
    </div>

  </div>
</div>

<!-- Footer -->
<footer class="text-center p-3 mt-5" style="background:#f8c8dc;">
  <p>© 2026 CrochetCraft | Made with ❤️</p>
</footer>

</body>
</html>
